# 除外パスは先頭スラッシュ付きで指定する (pygbag の gathering.py は
# プロジェクトルート基準の "/dir/sub" 形式でフォルダを渡し、filtering.py は
# startswith("/dir/") で照合するため。スラッシュ無しだとサブフォルダが
# 除外されず同梱されてしまう。例: "exports" では exports/v095_screenshots/ が漏れる)
[DEPENDENCIES]
ignoreDirs = ["/build", "/docs", "/exports", "/prompts", "/reference", "/prototype", "/saves", "/.git", "/.github", "/.devcontainer", "/.claude", "/assets", "/__pycache__"]
ignoreFiles = ["README.md", "HANDOFF.md", "requirements.txt", ".gitignore", ".DS_Store"]
